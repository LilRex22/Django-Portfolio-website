{% extends 'base.html' %}
{% load static %}


{% block content %}
    <header class="">
        <div class="container">
            <img class="img-fluid position-relative float-end" src="https://res.cloudinary.com/dmzf7hvpd/image/upload/v1774792611/web-development-programmer-engineering-coding-website-augmented-reality-interface-screens-developer-project-engineer-programming-software-application-design-cartoon-illustration_1_thzjhs.png" alt="developer">
        </div>
    </header>
        
    <!-- the projects listed -->
    <section>
        <div class="container">
            {% for project in projects %}
                <div class="container p-3 d-flex flex-column flex-lg-row align-items-center align-items-lg-start" style="box-shadow: 2px 5px 10px grey;">
                    <img class="img-fluid rounded-3" src="{{project.Image.url}}" alt="project img" style="width: 25rem;">
                    <div class="container ms-lg-3 d-flex flex-column">
                        <h2 class="">{{project.Name}}</h2>
                        <p class="mt-4">{{project.Description}}</p>
                        
                        <div class="container ps-0 mb-3">
                            <img src="{{project.Tech_stack1.url}}" alt="">
                            <img src="{{project.Tech_stack2.url}}" alt="">
                            <img src="{{project.Tech_stack3.url}}" alt="">
                        </div>
                        
                        <div class="container ps-0">
                            <a class="btn btn-info" href="" style="background-color: rgb(206, 3, 206); border: none;"><img width="32" height="32" src="https://img.icons8.com/sf-regular/48/play.png" alt="play"/>View live</a>
                            <a class="btn btn-outline-dark" href=""><img width="32" height="32" src="https://img.icons8.com/windows/32/github.png" alt="github"/>View on Github</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </section>
{% endblock %}
